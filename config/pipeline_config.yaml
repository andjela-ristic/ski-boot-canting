paths:
  working_png_dir: "data/working_png"
  processed_dir: "data/processed"
  metadata_dir: "data/metadata"

display:
  max_height: 800
  show_windows: true
  wait_between_images: true

step_01_illumination_normalization:
  enabled: true

  method: "LAB_CLAHE"

  clahe:
    clip_limit: 2.0
    clip_limit_test_values: [1.5, 2.0, 2.5, 3.0]

    tile_grid_size: [16, 16]
    tile_grid_size_test_values:
      - [4, 4]
      - [8, 8]
      - [16, 16]

  output_subdir: "01_illumination_normalized"

step_02_grayscale_and_blur:
  enabled: true

  input_subdir: "01_illumination_normalized"
  output_subdir: "02_grayscale_blur"

  selected_output: "gaussian_blur"

  grayscale:
    enabled: true

  gaussian_blur:
    enabled: true
    kernel_size: 3
    kernel_size_test_values: [3, 5, 7]
    sigma_x: 1.0
    sigma_x_test_values: [0, 1.0, 1.5]

  bilateral_filter:
    enabled: true
    diameter: 7
    diameter_test_values: [5, 7, 9, 11]
    sigma_color: 50
    sigma_color_test_values: [50, 75, 100]
    sigma_space: 50
    sigma_space_test_values: [50, 75, 100]

step_03_edge_detection:
  enabled: true

  input_step: "02_grayscale_and_blur"
  output_subdir: "03_edges"

  canny:
    threshold_1: 75
    threshold_1_test_values: [30, 50, 75, 100]

    threshold_2: 100
    threshold_2_test_values: [100, 150, 200, 250]

    aperture_size: 3
    aperture_size_test_values: [3, 5]

    use_l2_gradient: true
    use_l2_gradient_test_values: [false, true]

step_04_line_detection_hough:
  enabled: true

  input_step: "03_edge_detection"
  output_subdir: "04_lines_hough"

  hough_lines_p:
    rho: 1
    theta_divisor: 180

    threshold: 40
    threshold_test_values: [40, 45, 50]

    min_line_length: 80
    min_line_length_test_values: [70, 75, 80]

    max_line_gap: 20
    max_line_gap_test_values: [20]

  classification:
    vertical_angle_tolerance_degrees: 10
    vertical_angle_tolerance_degrees_test_values: [10]

    horizontal_angle_tolerance_degrees: 8
    horizontal_angle_tolerance_degrees_test_values: [8]

step_05_detect_boot_roi:
  enabled: true

  input_edges_subdir: "03_edges"
  input_visual_subdir: "01_illumination_normalized"
  output_subdir: "05_boot_roi"

  edge_activity:
    density_kernel_size: 51
    density_threshold: 0.039
    close_kernel_size: 41
    dilate_kernel_size: 31
    dilate_iterations: 1
  
  component_scoring:
    preferred_x_ratio: 0.50
    preferred_y_ratio: 0.56
  
    x_band_ratio: 0.425
    y_band_ratio: 0.56
  
    edge_density_weight: 0.21
    area_weight: 0.32
    center_weight: 0.27
    shape_weight: 0.20
  
  roi_padding:
    x_padding_ratio: 0.068
    y_padding_ratio: 0.10
  
  component_filtering:
    min_area_ratio: 0.006
    max_area_ratio: 0.55

    min_width_ratio: 0.12
    max_width_ratio: 0.75

    min_height_ratio: 0.20
    max_height_ratio: 0.95

  boot_mask:
    use_convex_hull: true
    selected_vertical_mask: "roi_mask"

  draw:
    show_all_candidate_boxes: true

step_06_detect_boot_landmarks:
  enabled: true
  input_visual_subdir: "01_illumination_normalized"
  input_edges_subdir: "03_edges"
  output_subdir: "06_boot_landmarks"
  detection_input: "edges"

  edge_fallback:
    blur_kernel: 5
    threshold_1: 50
    threshold_2: 150

  hough:
    median_blur_kernel: 1
    dp: 1.2
    min_dist: 45
    param1: 100
    param2: 70
    min_radius: 10
    max_radius: 75