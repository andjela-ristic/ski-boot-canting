paths:
  working_png_dir: "data/working_png"
  processed_dir: "data/processed"
  metadata_dir: "data/metadata"

display:
  show_windows: true
  wait_between_images: true
  max_height: 900

step_01_illumination_normalization:
  enabled: true

  method: "LAB_CLAHE"

  clahe:
    clip_limit: 2.0
    clip_limit_test_values: [1.5, 2.0, 2.5, 3.0]

    tile_grid_size: [16, 16]
    tile_grid_size_test_values:
      - [4, 4]
      - [8, 8]
      - [16, 16]

  output_subdir: "01_illumination_normalized"

step_02_grayscale_and_blur:
  enabled: true
  input_subdir: "01_illumination_normalized"
  output_subdir: "02_grayscale_blur"
  
  selected_output: "bilateral_filter"

  grayscale:
    enabled: true
    method: "bgr2gray"  

  gaussian_blur:
    enabled: true
    kernel_size: 7
    sigma_x: 2.0

  bilateral_filter:
    enabled: true
    diameter: 15
    sigma_color: 75
    sigma_space: 75

step_03_edge_detection:
  enabled: true

  selected_input: "grayscale_lab_l"
  output_subdir: "03_edges"
  selected_output: "cleaned"
  selected_output_test_values: ["raw", "cleaned"]

  canny:
    mode: "manual"
    mode_test_values: ["manual", "auto_median"]
    threshold_1: 40
    threshold_2: 120

    aperture_size: 3
    use_l2_gradient: true

    auto_sigma: 0.33

  preprocessing:
    enabled: false
    gaussian_kernel_size: 3
    gaussian_sigma_x: 0.0

  postprocessing:
    enabled: true

    dilate_iterations: 1
    dilate_kernel_size: [3, 3]

    close_kernel_size: [3, 3]
    open_kernel_size: [0, 0]

    erode_iterations: 0
    erode_kernel_size: [3, 3]

  saved_test_variants:
    - name: "roi_edges"
      output_subdir: "03_edges/roi_edges"
      use_step_03_test_input: true
      override:
        selected_output: "cleaned"
        canny:
          mode: "auto_median"

step_14_debug_hough_lines:
  enabled: true

  input_step: "03_edge_detection"
  output_subdir: "14_debug_hough_lines"

  hough_lines_p:
    rho: 1
    theta_divisor: 180

    threshold: 40
    threshold_test_values: [40, 45, 50]

    min_line_length: 80
    min_line_length_test_values: [70, 75, 80]

    max_line_gap: 20
    max_line_gap_test_values: [20]

  classification:
    vertical_angle_tolerance_degrees: 10
    vertical_angle_tolerance_degrees_test_values: [10]

    horizontal_angle_tolerance_degrees: 8
    horizontal_angle_tolerance_degrees_test_values: [8]
