paths:
  working_png_dir: "data/working_png"
  processed_dir: "data/processed"
  metadata_dir: "data/metadata"

display:
  max_height: 800
  show_windows: true
  wait_between_images: true

step_01_illumination_normalization:
  enabled: true

  method: "LAB_CLAHE"

  clahe:
    clip_limit: 2.0
    clip_limit_test_values: [1.5, 2.0, 2.5, 3.0]

    tile_grid_size: [16, 16]
    tile_grid_size_test_values:
      - [4, 4]
      - [8, 8]
      - [16, 16]

  output_subdir: "01_illumination_normalized"

step_02_grayscale_and_blur:
  enabled: true
  input_subdir: "01_illumination_normalized"
  output_subdir: "02_grayscale_blur"
  
  selected_output: "bilateral_filter"

  grayscale:
    enabled: true
    method: "bgr2gray"  

  gaussian_blur:
    enabled: true
    kernel_size: 7
    sigma_x: 2.0

  bilateral_filter:
    enabled: true
    diameter: 15         # Sa 7 podignuto na 15 za jako zamućenje pozadine
    sigma_color: 75      # Agresivnije stapanje sličnih sivih tonova
    sigma_space: 75

step_03_edge_detection:
  enabled: true

  selected_input: "grayscale_lab_l"
  output_subdir: "03_edges"
  selected_output: "cleaned"   # options: raw, cleaned

  canny:
    mode: "manual"             # options: manual, auto_median
    threshold_1: 40
    threshold_2: 120

    aperture_size: 3
    use_l2_gradient: true

    auto_sigma: 0.33

  preprocessing:
    enabled: false
    gaussian_kernel_size: 3
    gaussian_sigma_x: 0.0

  postprocessing:
    enabled: true

    dilate_iterations: 1
    dilate_kernel_size: [3, 3]

    close_kernel_size: [3, 3]
    open_kernel_size: [0, 0]

    erode_iterations: 0
    erode_kernel_size: [3, 3]
    
step_14_debug_hough_lines:
  enabled: true

  input_step: "03_edge_detection"
  output_subdir: "14_debug_hough_lines"

  hough_lines_p:
    rho: 1
    theta_divisor: 180

    threshold: 40
    threshold_test_values: [40, 45, 50]

    min_line_length: 80
    min_line_length_test_values: [70, 75, 80]

    max_line_gap: 20
    max_line_gap_test_values: [20]

  classification:
    vertical_angle_tolerance_degrees: 10
    vertical_angle_tolerance_degrees_test_values: [10]

    horizontal_angle_tolerance_degrees: 8
    horizontal_angle_tolerance_degrees_test_values: [8]

step_04_detect_boot_roi:
  enabled: true
  input_subdir: "02_grayscale_blur"
  selected_input: "grayscale_bgr2gray"
  output_subdir: "04_boot_roi"

  threshold:
    # Adaptivni je mrtav, otsu i fixed preuzimaju kontrolu
    method: "fixed"
    method_test: ["fixed", "otsu"]

    # Testiramo pragove: pošto je čizma tamnija od svetlih delova zavese
    fixed_threshold: 110
    fixed_threshold_test: [90, 110, 130]

    adaptive_method: "gaussian"
    adaptive_method_test: ["gaussian"]
    adaptive_block_size: 51
    adaptive_block_size_test: [51]
    adaptive_c: 3
    adaptive_c_test: [3]

    # Invert true/false će sada igrati ključnu ulogu da baci zavesu u crno
    invert: false
    invert_test: [false, true]

  boundary:
    # Granica po logici iz ZIP primera:
    # erosion  => boundary = A - erode(A)
    # dilation => boundary = dilate(A) - A
    # both     => union obe granice
    mode: "both"
    mode_test: ["erosion", "dilation", "both"]

    erode_kernel_size: [5, 5]
    erode_kernel_size_test:
      - [3, 3]
      - [5, 5]

    erode_iterations: 1
    erode_iterations_test: [1]

    dilate_kernel_size: [5, 5]
    dilate_kernel_size_test:
      - [3, 3]
      - [5, 5]

    dilate_iterations: 1
    dilate_iterations_test: [1]

    postprocess_enabled: true
    postprocess_enabled_test: [true]

    post_close_kernel_size: [11, 11]
    post_close_kernel_size_test:
      - [9, 9]
      - [11, 11]

    post_close_iterations: 1
    post_close_iterations_test: [1]

    post_dilate_kernel_size: [5, 5]
    post_dilate_kernel_size_test:
      - [3, 3]
      - [5, 5]

    post_dilate_iterations: 1
    post_dilate_iterations_test: [1]

  contour_filter:
    # Vraćamo podrazumevane filtere veličine da odmah od baci sitno smeće
    min_area_ratio: 0.015
    min_area_ratio_test: [0.015]
    max_area_ratio: 0.65
    max_area_ratio_test: [0.65]

    center_weight: 4.0
    center_weight_test: [4.0]
    vertical_weight: 2.0
    vertical_weight_test: [2.0]
    prefer_lower_half: true
    prefer_lower_half_test: [true]

  mask:
    convex_hull: true
    convex_hull_test: [true]
    fill_contour: true
    fill_contour_test: [true]
    final_close_kernel_size: [31, 31]
    final_close_kernel_size_test:
      - [31, 31]
    final_close_iterations: 1
    final_close_iterations_test: [1]

  debug:
    save_debug_steps: true
    save_metadata: true

step_06_detect_boot_landmarks:
  enabled: true
  input_visual_subdir: "01_illumination_normalized"
  input_edges_subdir: "03_edges"
  output_subdir: "06_boot_landmarks"
  detection_input: "edges"

  edge_fallback:
    blur_kernel: 5
    threshold_1: 50
    threshold_2: 150

  hough:
    median_blur_kernel: 1
    median_blur_kernel_test_values: [1]

    edge_dilate_iterations: 0
    edge_dilate_iterations_test_values: [0, 1]

    dp: 1.1
    dp_test_values: [1.1, 1.2, 1.3]

    min_dist: 45
    min_dist_test_values: [35, 45, 55]

    param1: 100
    param1_test_values: [100, 120]

    param2: 75
    param2_test_values: [60, 65, 70, 75, 80]

    min_radius: 12
    min_radius_test_values: [8, 10, 12]

    max_radius: 75
    max_radius_test_values: [60, 75, 90]

step_07_complete_line_fragments:
  enabled: true

  input_visual_subdir: "01_illumination_normalized"
  input_edges_subdir: "03_edges"
  input_roi_subdir: "04_boot_roi"
  output_subdir: "07_complete_line_fragments"

  mask_filter:
    enabled: true
    mode: "boot_mask"
    dilate_kernel_size: 1
    dilate_iterations: 0
    use_inner_mask_for_hough: true
    inner_mask_min_distance_px: 18
    min_line_mask_coverage: 0.60

  line_selection:
    use_only_vertical: true
    vertical_angle_tolerance_degrees: 8
    min_fragment_length_px: 60

  hough_lines_p:
    rho: 1
    theta_divisor: 180
    threshold: 45
    threshold_test_values: [40, 45, 50]

    min_line_length: 80
    min_line_length_test_values: [50, 60, 70, 80]

    max_line_gap: 15
    max_line_gap_test_values: [15, 20, 30]

  extension:
    extend_to_mask_bounds: true
    extend_padding_px: 20

  merge:
    max_gap_px: 60
    max_gap_px_test_values: [60, 90, 120]

    exact:
      enabled: true
      max_angle_diff_degrees: 1.5
      max_rho_diff_px: 5

    shift:
      enabled: true
      max_parallel_shift_px: 10
      max_parallel_shift_px_test_values: [10, 14, 18, 24]
      max_angle_diff_degrees: 1.5

    rotate:
      enabled: true
      max_angle_adjust_degrees: 1.5
      max_angle_adjust_degrees_test_values: [1.5, 2.0, 3.0]
      max_parallel_shift_after_rotation_px: 8

    iterative_merge: true
    max_iterations: 8

  dominance:
    length_weight: 0.40
    edge_support_weight: 0.25
    fragment_count_weight: 0.20
    shift_penalty_weight: 0.10
    angle_penalty_weight: 0.05

  scoring:
    edge_support_radius_px: 2

  synthetic_centerlines:
    enabled: true
    source_mask: "hough_mask"
    min_row_width_px: 40
    sample_step_px: 5
    offsets_px: [-30, -15, 0, 15, 30]
    angle_offsets_degrees: [0.0]
    keep_only_inside_mask: true
    min_mask_coverage: 0.60
    min_keep_after_ranking: 3
    support_score: 0.25
    edge_bonus_weight: 0.10
    coverage_bonus_weight: 0.05

  hypotheses:
    keep_single_fragments: true
    keep_top_hypotheses_per_seed: 5
    max_total_hypotheses: 100
    min_support_score: 0.0

  debug:
    enabled: true
    draw_original_fragments: true
    draw_mask_filtered_fragments: true
    draw_vertical_fragments: true
    draw_completed_lines: true
    draw_transform_labels: true
    max_completed_lines_to_draw: 25
