paths:
  working_png_dir: "data/working_png"
  processed_dir: "data/processed"
  metadata_dir: "data/metadata"

display:
  show_windows: true
  wait_between_images: true
  max_height: 900

step_01_illumination_normalization:
  enabled: true

  method: "LAB_CLAHE"

  clahe:
    clip_limit: 2.0
    clip_limit_test_values: [1.5, 2.0, 2.5, 3.0]

    tile_grid_size: [16, 16]
    tile_grid_size_test_values:
      - [4, 4]
      - [8, 8]
      - [16, 16]

  output_subdir: "01_illumination_normalized"

step_02_grayscale_and_blur:
  enabled: true
  input_subdir: "01_illumination_normalized"
  output_subdir: "02_grayscale_blur"
  
  selected_output: "bilateral_filter"

  grayscale:
    enabled: true
    method: "bgr2gray"  

  gaussian_blur:
    enabled: true
    kernel_size: 7
    sigma_x: 2.0

  bilateral_filter:
    enabled: true
    diameter: 15
    sigma_color: 75
    sigma_space: 75

step_03_edge_detection:
  enabled: true

  selected_input: "grayscale_lab_l"
  output_subdir: "03_edges"
  selected_output: "cleaned"
  selected_output_test_values: ["raw", "cleaned"]

  canny:
    mode: "manual"
    mode_test_values: ["manual", "auto_median"]
    threshold_1: 40
    threshold_2: 120

    aperture_size: 3
    use_l2_gradient: true

    auto_sigma: 0.33

  preprocessing:
    enabled: false
    gaussian_kernel_size: 3
    gaussian_sigma_x: 0.0

  postprocessing:
    enabled: true

    dilate_iterations: 1
    dilate_kernel_size: [3, 3]

    close_kernel_size: [3, 3]
    open_kernel_size: [0, 0]

    erode_iterations: 0
    erode_kernel_size: [3, 3]

  saved_test_variants:
    - name: "roi_edges"
      output_subdir: "03_edges/roi_edges"
      use_step_03_test_input: true
      override:
        selected_output: "cleaned"
        canny:
          mode: "manual"
          threshold_1: 60
          threshold_2: 140

step_04_boot_roi_from_edges:
  enabled: true

  input_subdir: "03_edges"
  selected_input: "roi_edges"

  output_subdir: "04_boot_roi_from_edges"

  edge_threshold: 1

  noise:
    min_component_area: 12

  density:
    kernel_size: 61
    threshold_percentile: 82
    min_threshold: 3

  center_prior:
    enabled: true
    sigma_x_ratio: 0.28
    sigma_y_ratio: 0.38
    power: 1.2

  morphology:
    close_kernel_size: 65
    dilate_kernel_size: 41
    second_close_kernel_size: 95
    smooth_kernel_size: 17
    iterations_close: 1
    iterations_dilate: 1
    iterations_second_close: 1

  component_selection:
    min_area_ratio: 0.01
    center_weight: 2.0
    vertical_extent_weight: 1.0

  hull:
    enabled: true
    mode: "convex"
    approx_epsilon_ratio: 0.008

  overlay:
    alpha: 0.35
    contour_thickness: 3

  test_presets:
    - name: "wider_cutoff_more_grow"
      override: {}
    - name: "wider_cutoff_soft_center"
      override:
        density:
          threshold_percentile: 83
          min_threshold: 3
        center_prior:
          sigma_x_ratio: 0.38
          sigma_y_ratio: 0.48
          power: 0.7
        morphology:
          close_kernel_size: 59
          dilate_kernel_size: 35
          second_close_kernel_size: 85

step_05_valid_hough_lines_in_roi:
  enabled: true

  edge_input_subdir: "03_edges/cleaned"
  roi_mask_subdir: "04_boot_roi_from_edges/mask"
  output_subdir: "05_valid_hough_lines_in_roi"

  save:
    debug_images: true
    metadata_csv: false
    valid_lines_json: true

  roi:
    use_inner_mask: true
    inner_erode_kernel_size: 31
    inner_erode_kernel_size_test_values: [21, 31, 41]
    inner_erode_iterations: 1
    inner_erode_iterations_test_values: [1, 2]

  hough_lines_p:
    rho: 1
    theta_degrees: 1
    threshold: 55
    threshold_test_values: [35, 45, 55]
    min_line_length: 100
    min_line_length_test_values: [60, 80, 100]
    max_line_gap: 15
    max_line_gap_test_values: [15, 25, 35]

  validation:
    min_mask_support_ratio: 0.92
    min_mask_support_ratio_test_values: [0.85, 0.92, 0.97]
    min_points_inside_mask: 60
    min_points_inside_mask_test_values: [40, 60, 90]
    max_deviation_from_vertical_degrees: 20

  drawing:
    raw_line_thickness: 2
    valid_line_thickness: 3

  test_presets:
    - name: "default"
      override: {}
    - name: "looser_hough"
      override:
        hough_lines_p:
          threshold: 35
          min_line_length: 60
          max_line_gap: 35
    - name: "stricter_hough"
      override:
        hough_lines_p:
          threshold: 55
          min_line_length: 100
          max_line_gap: 15
    - name: "looser_mask_support"
      override:
        validation:
          min_mask_support_ratio: 0.85
          min_points_inside_mask: 40
          max_deviation_from_vertical_degrees: 25
    - name: "stricter_mask_support"
      override:
        validation:
          min_mask_support_ratio: 0.97
          min_points_inside_mask: 90
          max_deviation_from_vertical_degrees: 12
    - name: "narrower_inner_roi"
      override:
        roi:
          inner_erode_kernel_size: 41
          inner_erode_iterations: 2
    - name: "wider_inner_roi"
      override:
        roi:
          inner_erode_kernel_size: 21
          inner_erode_iterations: 1

