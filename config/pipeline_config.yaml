paths:
  working_png_dir: "data/working_png"
  processed_dir: "data/processed"
  metadata_dir: "data/metadata"

display:
  max_height: 800
  show_windows: true
  wait_between_images: true

step_01_illumination_normalization:
  enabled: true

  method: "LAB_CLAHE"

  clahe:
    clip_limit: 2.0
    clip_limit_test_values: [1.5, 2.0, 2.5, 3.0]

    tile_grid_size: [16, 16]
    tile_grid_size_test_values:
      - [4, 4]
      - [8, 8]
      - [16, 16]

  output_subdir: "01_illumination_normalized"

step_02_grayscale_and_blur:
  enabled: true

  input_subdir: "01_illumination_normalized"
  output_subdir: "02_grayscale_blur"

  selected_output: "gaussian_blur"

  grayscale:
    enabled: true

  gaussian_blur:
    enabled: true
    kernel_size: 3
    kernel_size_test_values: [3, 5, 7]
    sigma_x: 1.0
    sigma_x_test_values: [0, 1.0, 1.5]

  bilateral_filter:
    enabled: true
    diameter: 7
    diameter_test_values: [5, 7, 9, 11]
    sigma_color: 50
    sigma_color_test_values: [50, 75, 100]
    sigma_space: 50
    sigma_space_test_values: [50, 75, 100]

step_03_edge_detection:
  enabled: true

  input_step: "02_grayscale_and_blur"
  output_subdir: "03_edges"

  canny:
    threshold_1: 75
    threshold_1_test_values: [30, 50, 75, 100]

    threshold_2: 100
    threshold_2_test_values: [100, 150, 200, 250]

    aperture_size: 3
    aperture_size_test_values: [3, 5]

    use_l2_gradient: true
    use_l2_gradient_test_values: [false, true]

step_04_line_detection_hough:
  enabled: true

  input_step: "03_edge_detection"
  output_subdir: "04_lines_hough"

  hough_lines_p:
    rho: 1
    theta_divisor: 180

    threshold: 40
    threshold_test_values: [40, 45, 50]

    min_line_length: 80
    min_line_length_test_values: [70, 75, 80]

    max_line_gap: 20
    max_line_gap_test_values: [20]

  classification:
    vertical_angle_tolerance_degrees: 10
    vertical_angle_tolerance_degrees_test_values: [10]

    horizontal_angle_tolerance_degrees: 8
    horizontal_angle_tolerance_degrees_test_values: [8]

step_05_detect_boot_roi:
  enabled: true

  input_edges_subdir: "03_edges"
  input_visual_subdir: "01_illumination_normalized"
  output_subdir: "05_boot_roi"

  edge_activity:
    density_kernel_size: 51
    density_threshold: 0.039
    close_kernel_size: 41
    dilate_kernel_size: 31
    dilate_iterations: 1
  
  component_scoring:
    preferred_x_ratio: 0.50
    preferred_y_ratio: 0.56
  
    x_band_ratio: 0.425
    y_band_ratio: 0.56
  
    edge_density_weight: 0.21
    area_weight: 0.32
    center_weight: 0.27
    shape_weight: 0.20
  
  roi_padding:
    x_padding_ratio: 0.068
    y_padding_ratio: 0.10
  
  component_filtering:
    min_area_ratio: 0.006
    max_area_ratio: 0.55

    min_width_ratio: 0.12
    max_width_ratio: 0.75

    min_height_ratio: 0.20
    max_height_ratio: 0.95

  boot_mask:
    use_convex_hull: true
    selected_vertical_mask: "roi_mask"

  draw:
    show_all_candidate_boxes: true

step_06_detect_boot_landmarks:
  enabled: true
  input_visual_subdir: "01_illumination_normalized"
  input_edges_subdir: "03_edges"
  output_subdir: "06_boot_landmarks"
  detection_input: "edges"

  edge_fallback:
    blur_kernel: 5
    threshold_1: 50
    threshold_2: 150

  hough:
    median_blur_kernel: 1
    median_blur_kernel_test_values: [1]

    edge_dilate_iterations: 0
    edge_dilate_iterations_test_values: [0, 1]

    dp: 1.1
    dp_test_values: [1.1, 1.2, 1.3]

    min_dist: 45
    min_dist_test_values: [35, 45, 55]

    param1: 100
    param1_test_values: [100, 120]

    param2: 75
    param2_test_values: [60, 65, 70, 75, 80]

    min_radius: 12
    min_radius_test_values: [8, 10, 12]

    max_radius: 75
    max_radius_test_values: [60, 75, 90]

step_07_complete_line_fragments:
  enabled: true

  input_visual_subdir: "01_illumination_normalized"
  input_edges_subdir: "03_edges"
  input_roi_subdir: "05_boot_roi"
  output_subdir: "07_complete_line_fragments"

  mask_filter:
    enabled: true
    mode: "boot_mask"
    dilate_kernel_size: 21
    dilate_iterations: 1
    min_line_mask_coverage: 0.45

  line_selection:
    use_only_vertical: true
    vertical_angle_tolerance_degrees: 15
    min_fragment_length_px: 35

  hough_lines_p:
    rho: 1
    theta_divisor: 180
    threshold: 45
    threshold_test_values: [40, 45, 50]

    min_line_length: 70
    min_line_length_test_values: [50, 60, 70, 80]

    max_line_gap: 20
    max_line_gap_test_values: [15, 20, 30]

  extension:
    extend_to_mask_bounds: true
    extend_padding_px: 20

  merge:
    max_gap_px: 90
    max_gap_px_test_values: [60, 90, 120]

    exact:
      enabled: true
      max_angle_diff_degrees: 2.0
      max_rho_diff_px: 6

    shift:
      enabled: true
      max_parallel_shift_px: 18
      max_parallel_shift_px_test_values: [10, 14, 18, 24]
      max_angle_diff_degrees: 2.0

    rotate:
      enabled: true
      max_angle_adjust_degrees: 3.0
      max_angle_adjust_degrees_test_values: [1.5, 2.0, 3.0]
      max_parallel_shift_after_rotation_px: 12

    iterative_merge: true
    max_iterations: 8

  dominance:
    length_weight: 0.40
    edge_support_weight: 0.25
    fragment_count_weight: 0.20
    shift_penalty_weight: 0.10
    angle_penalty_weight: 0.05

  scoring:
    edge_support_radius_px: 2

  hypotheses:
    keep_single_fragments: true
    keep_top_hypotheses_per_seed: 5
    max_total_hypotheses: 100
    min_support_score: 0.0

  debug:
    enabled: true
    draw_original_fragments: true
    draw_mask_filtered_fragments: true
    draw_vertical_fragments: true
    draw_completed_lines: true
    draw_transform_labels: true