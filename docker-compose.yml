services:
  canting-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ski-boot-canting-api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./api/.runtime:/app/api/.runtime
    restart: unless-stopped
