services:
  canting-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ski-boot-canting-api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data:ro
      - ./backend/api/.runtime:/app/api/.runtime
    restart: unless-stopped

  canting-web:
    build:
      context: ./web_app
      dockerfile: Dockerfile
    container_name: ski-boot-canting-web
    depends_on:
      - canting-api
    ports:
      - "8080:80"
    restart: unless-stopped

  canting-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ski-boot-canting-tunnel
    depends_on:
      - canting-web
    environment:
      PORT: 80
      TARGET_HOST: canting-web
    command: ["sh", "/scripts/start_cloudflare_tunnel.sh"]
    volumes:
      - ./backend/scripts:/scripts:ro
    restart: unless-stopped
